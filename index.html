<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek Vision Chat - Con archivos</title>
    <!-- Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Highlight.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f;
            height: 100vh;
            overflow: hidden;
            color: #e1e1e1;
        }
        .app { display: flex; height: 100vh; }
        /* Sidebar */
        .sidebar {
            width: 260px;
            background: #0a0a0a;
            border-right: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            transition: width 0.2s;
            position: relative;
        }
        .sidebar.collapsed { width: 60px; }
        .sidebar-toggle {
            position: absolute;
            right: -12px;
            top: 20px;
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            color: #888;
            font-size: 12px;
        }
        .sidebar-header { padding: 16px; border-bottom: 1px solid #2a2a2a; }
        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }
        .new-chat-btn:hover { background: #2a2a2a; }
        .conversations-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        .conv-item {
            padding: 12px;
            margin-bottom: 4px;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .conv-item:hover { background: #1a1a1a; }
        .conv-item.active { background: #1e2a3a; border-left: 3px solid #4a9eff; }
        .conv-title { font-weight: 500; margin-bottom: 4px; font-size: 13px; }
        .conv-date { font-size: 11px; color: #6b6b6b; }
        .conv-actions {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            display: none;
            gap: 6px;
        }
        .conv-item:hover .conv-actions { display: flex; }
        .conv-actions button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            opacity: 0.6;
            padding: 4px;
            border-radius: 4px;
        }
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f0f0f;
        }
        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0a0a0a;
        }
        .model-selector {
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 13px;
            color: white;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e74c3c;
            display: inline-block;
        }
        .status-dot.connected { background: #27ae60; }
        .status-dot.testing { background: #f39c12; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
        }
        .message {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 24px;
            display: flex;
            gap: 16px;
            border-bottom: 1px solid #1a1a1a;
        }
        .message.user { background: transparent; }
        .message.assistant { background: #0a0a0a; }
        .message-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .message-content {
            flex: 1;
            line-height: 1.6;
            font-size: 15px;
        }
        .message-content img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            margin: 8px 0;
            border: 1px solid #2a2a2a;
        }
        .message-content pre { background: #1a1a1a; padding: 12px; border-radius: 8px; overflow-x: auto; }
        .message-content code { background: #1a1a1a; padding: 2px 6px; border-radius: 4px; }
        .message-actions {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .message:hover .message-actions { opacity: 1; }
        .message-actions button {
            background: none;
            border: none;
            color: #6b6b6b;
            cursor: pointer;
            font-size: 13px;
            padding: 4px 8px;
            border-radius: 6px;
        }
        .input-container {
            padding: 20px 24px 32px;
            background: #0f0f0f;
        }
        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            background: #1a1a1a;
            border-radius: 24px;
            border: 1px solid #2a2a2a;
        }
        textarea {
            width: 100%;
            background: transparent;
            border: none;
            padding: 16px 20px;
            color: white;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            outline: none;
            min-height: 60px;
            max-height: 200px;
        }
        .input-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px 12px;
            border-top: 1px solid #2a2a2a;
        }
        .file-attach {
            background: none;
            border: none;
            color: #6b6b6b;
            cursor: pointer;
            font-size: 20px;
            padding: 4px 8px;
            border-radius: 20px;
        }
        .file-preview {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #0a0a0a;
            border-radius: 20px;
            margin: 0 16px 8px 16px;
        }
        .file-preview img {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 6px;
        }
        .send-btn {
            background: #4a9eff;
            border: none;
            border-radius: 20px;
            padding: 8px 20px;
            color: white;
            font-weight: 500;
            cursor: pointer;
        }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .api-config {
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 12px;
        }
        .api-config input {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 6px 12px;
            color: white;
            width: 280px;
        }
        .loading {
            display: inline-flex;
            gap: 4px;
            align-items: center;
        }
        .loading span {
            width: 6px;
            height: 6px;
            background: #6b6b6b;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 13px;
            z-index: 1000;
            animation: slideIn 0.2s;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #2a2a2a; }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-toggle" onclick="toggleSidebar()">◀</div>
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="createNewChat()">+ Nueva conversación</button>
        </div>
        <div class="conversations-list" id="conversationsList"></div>
    </div>

    <div class="chat-main">
        <div class="chat-header">
            <h1>🤖 DeepSeek Vision <span style="font-weight: normal;">con archivos</span></h1>
            <div style="display: flex; gap: 12px; align-items: center;">
                <select id="modelSelect" class="model-selector">
                    <option value="deepseek-chat">DeepSeek-V3 (texto + imagen)</option>
                </select>
                <div class="api-config">
                    <input type="password" id="apiKeyInput" placeholder="API Key">
                    <button id="testApiBtn">Probar</button>
                    <div id="statusDot" class="status-dot"></div>
                </div>
            </div>
        </div>

        <div class="messages" id="messages"></div>

        <div class="input-container">
            <div id="filePreviewArea" class="file-preview" style="display: none;"></div>
            <div class="input-wrapper">
                <textarea id="messageInput" rows="1" placeholder="Escribe un mensaje... o adjunta una imagen"></textarea>
                <div class="input-footer">
                    <div style="display: flex; gap: 8px;">
                        <button class="file-attach" id="attachBtn" title="Adjuntar imagen">📎</button>
                        <input type="file" id="fileInput" accept="image/*" style="display: none;">
                    </div>
                    <button class="send-btn" id="sendBtn">Enviar</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ---------- CONFIGURACIÓN ----------
    let conversations = {};
    let currentId = null;
    let apiKey = localStorage.getItem('deepseek_api_key') || '';
    let isApiReady = false;
    let pendingImages = []; // almacena { dataUrl, name, type }

    // Markdown config
    marked.setOptions({
        highlight: function(code, lang) {
            if (lang && hljs.getLanguage(lang)) return hljs.highlight(code, { language: lang }).value;
            return hljs.highlightAuto(code).value;
        }
    });

    // ---------- CONVERSACIONES ----------
    function loadConversations() {
        const saved = localStorage.getItem('deepseek_conversations');
        if (saved) {
            conversations = JSON.parse(saved);
            if (Object.keys(conversations).length === 0) createDefaultChat();
        } else createDefaultChat();
        const lastId = localStorage.getItem('deepseek_last_id');
        if (lastId && conversations[lastId]) currentId = lastId;
        else currentId = Object.keys(conversations)[0];
        renderSidebar();
        renderMessages();
    }

    function createDefaultChat() {
        const id = Date.now().toString();
        conversations[id] = {
            id: id,
            title: 'Nueva conversación',
            updated: Date.now(),
            messages: [{ role: 'assistant', content: '¡Hola! Puedo leer imágenes. Adjunta una foto o diagrama y te ayudaré a analizarlo.' }]
        };
        currentId = id;
        saveConversations();
    }

    function saveConversations() {
        localStorage.setItem('deepseek_conversations', JSON.stringify(conversations));
        if (currentId) localStorage.setItem('deepseek_last_id', currentId);
    }

    function renderSidebar() {
        const container = document.getElementById('conversationsList');
        const sorted = Object.values(conversations).sort((a,b) => b.updated - a.updated);
        container.innerHTML = sorted.map(conv => `
            <div class="conv-item ${conv.id === currentId ? 'active' : ''}" onclick="switchChat('${conv.id}')">
                <div class="conv-title">${escapeHtml(conv.title)}</div>
                <div class="conv-date">${new Date(conv.updated).toLocaleDateString()}</div>
                <div class="conv-actions">
                    <button onclick="event.stopPropagation(); deleteChat('${conv.id}')">🗑️</button>
                </div>
            </div>
        `).join('');
    }

    function renderMessages() {
        if (!currentId || !conversations[currentId]) return;
        const container = document.getElementById('messages');
        const conv = conversations[currentId];
        container.innerHTML = conv.messages.map(msg => {
            let contentHtml = '';
            if (msg.role === 'assistant') {
                contentHtml = marked.parse(msg.content);
            } else {
                // Mensaje de usuario puede contener imagen
                if (msg.images && msg.images.length) {
                    contentHtml = `<div>${escapeHtml(msg.content)}</div>`;
                    msg.images.forEach(img => {
                        contentHtml += `<img src="${img.dataUrl}" alt="imagen adjunta" style="max-width: 200px; margin-top: 8px;">`;
                    });
                } else {
                    contentHtml = escapeHtml(msg.content).replace(/\n/g, '<br>');
                }
            }
            return `
                <div class="message ${msg.role}">
                    <div class="message-icon">${msg.role === 'user' ? '👤' : '🤖'}</div>
                    <div class="message-content">
                        ${contentHtml}
                        ${msg.role === 'assistant' ? `
                            <div class="message-actions">
                                <button onclick="copyText('${escapeHtml(msg.content).replace(/'/g, "\\'")}')">📋 Copiar</button>
                                <button onclick="regenerateLast()">🔄 Regenerar</button>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }).join('');
        container.scrollTop = container.scrollHeight;
        document.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
    }

    function addMessage(role, content, images = []) {
        if (!currentId) return;
        const msg = { role, content };
        if (images.length) msg.images = images;
        conversations[currentId].messages.push(msg);
        conversations[currentId].updated = Date.now();
        if (role === 'user' && conversations[currentId].messages.filter(m => m.role === 'user').length === 1) {
            let title = content.substring(0, 30);
            if (content.length > 30) title += '...';
            conversations[currentId].title = title;
        }
        saveConversations();
        renderSidebar();
        renderMessages();
    }

    function switchChat(id) {
        if (conversations[id]) {
            currentId = id;
            saveConversations();
            renderSidebar();
            renderMessages();
        }
    }

    function deleteChat(id) {
        if (confirm('¿Eliminar conversación?')) {
            delete conversations[id];
            if (currentId === id) {
                const remaining = Object.keys(conversations);
                currentId = remaining.length ? remaining[0] : null;
                if (!currentId) createDefaultChat();
            }
            saveConversations();
            renderSidebar();
            renderMessages();
            showToast('Conversación eliminada');
        }
    }

    function createNewChat() {
        const id = Date.now().toString();
        conversations[id] = {
            id: id,
            title: `Conversación ${new Date().toLocaleString()}`,
            updated: Date.now(),
            messages: [{ role: 'assistant', content: '¡Hola! Puedo leer imágenes. Adjunta una foto o diagrama y te ayudaré a analizarlo.' }]
        };
        currentId = id;
        saveConversations();
        renderSidebar();
        renderMessages();
        showToast('Nueva conversación');
    }

    // ---------- MANEJO DE ARCHIVOS ----------
    function attachFile() {
        document.getElementById('fileInput').click();
    }

    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (!file.type.startsWith('image/')) {
            showToast('Solo se permiten imágenes por ahora');
            return;
        }
        // Leer como data URL
        const reader = new FileReader();
        reader.onload = (ev) => {
            const dataUrl = ev.target.result;
            pendingImages.push({ dataUrl, name: file.name, type: file.type });
            updateFilePreview();
        };
        reader.readAsDataURL(file);
        document.getElementById('fileInput').value = ''; // permitir re-adjuntar
    });

    function updateFilePreview() {
        const container = document.getElementById('filePreviewArea');
        if (pendingImages.length === 0) {
            container.style.display = 'none';
            container.innerHTML = '';
            return;
        }
        container.style.display = 'flex';
        container.innerHTML = pendingImages.map((img, idx) => `
            <div style="position: relative; display: inline-block;">
                <img src="${img.dataUrl}" style="width: 40px; height: 40px; object-fit: cover; border-radius: 6px;">
                <button onclick="removeImage(${idx})" style="position: absolute; top: -8px; right: -8px; background: #e74c3c; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; color: white; cursor: pointer;">✕</button>
            </div>
        `).join('');
    }

    function removeImage(index) {
        pendingImages.splice(index, 1);
        updateFilePreview();
    }

    // ---------- ENVÍO A LA API (con imagen) ----------
    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if ((!text && pendingImages.length === 0) || !isApiReady) return;

        const imagesToSend = [...pendingImages];
        pendingImages = [];
        updateFilePreview();

        // Construir mensaje de usuario (contenido multimodal)
        const userContent = [];
        if (text) userContent.push({ type: 'text', text: text });
        imagesToSend.forEach(img => {
            userContent.push({
                type: 'image_url',
                image_url: { url: img.dataUrl }
            });
        });

        // Guardar mensaje de usuario en el historial (con las imágenes para mostrar)
        addMessage('user', text, imagesToSend);

        // Mostrar loading
        const container = document.getElementById('messages');
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message assistant';
        loadingDiv.id = 'loading-msg';
        loadingDiv.innerHTML = `<div class="message-icon">🤖</div><div class="message-content"><div class="loading"><span></span><span></span><span></span> Analizando imagen...</div></div>`;
        container.appendChild(loadingDiv);
        container.scrollTop = container.scrollHeight;

        try {
            const model = document.getElementById('modelSelect').value;
            // Obtener historial reciente (últimos 20 mensajes)
            const history = conversations[currentId].messages.slice(-20);
            // Convertir mensajes a formato API
            const apiMessages = history.map(msg => {
                if (msg.role === 'user' && msg.images && msg.images.length) {
                    // Reconstruir contenido multimodal desde el historial
                    const parts = [];
                    if (msg.content) parts.push({ type: 'text', text: msg.content });
                    msg.images.forEach(img => {
                        parts.push({ type: 'image_url', image_url: { url: img.dataUrl } });
                    });
                    return { role: 'user', content: parts };
                }
                return { role: msg.role, content: msg.content };
            });

            const response = await fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: model,
                    messages: apiMessages,
                    temperature: 0.7,
                    max_tokens: 4096
                })
            });

            document.getElementById('loading-msg')?.remove();

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || 'Error en API');
            }

            const data = await response.json();
            const reply = data.choices[0].message.content;
            addMessage('assistant', reply);

        } catch (error) {
            document.getElementById('loading-msg')?.remove();
            addMessage('assistant', `❌ **Error:** ${error.message}\n\nVerifica tu API key y saldo en [platform.deepseek.com](https://platform.deepseek.com)`);
        } finally {
            input.value = '';
            input.style.height = 'auto';
        }
    }

    // ---------- API TEST ----------
    async function testApi() {
        const key = document.getElementById('apiKeyInput').value.trim();
        if (!key) { showToast('Ingresa API key'); return; }
        const dot = document.getElementById('statusDot');
        dot.className = 'status-dot testing';
        try {
            const response = await fetch('https://api.deepseek.com/models', {
                headers: { 'Authorization': `Bearer ${key}` }
            });
            if (response.ok) {
                apiKey = key;
                localStorage.setItem('deepseek_api_key', key);
                isApiReady = true;
                dot.className = 'status-dot connected';
                showToast('✅ API conectada correctamente');
                addSystemMessage('✅ API configurada. ¡Puedes subir imágenes!');
            } else throw new Error('Key inválida');
        } catch (error) {
            isApiReady = false;
            dot.className = 'status-dot';
            showToast('❌ Error: API key inválida o sin créditos');
        }
    }

    function addSystemMessage(content) {
        const container = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = 'message assistant';
        div.innerHTML = `<div class="message-icon">ℹ️</div><div class="message-content">${marked.parse(content)}</div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function copyText(text) {
        navigator.clipboard.writeText(text);
        showToast('📋 Copiado');
    }

    function regenerateLast() {
        // simple: borrar último asistente y reenviar último usuario (con imágenes)
        if (!conversations[currentId]) return;
        const msgs = conversations[currentId].messages;
        if (msgs.length < 2) return;
        if (msgs[msgs.length-1].role === 'assistant') {
            msgs.pop();
            saveConversations();
            renderMessages();
            const lastUser = msgs[msgs.length-1];
            if (lastUser.role === 'user') {
                // Recrear el mensaje original (texto e imágenes)
                const text = lastUser.content;
                const images = lastUser.images || [];
                // Quitamos también el mensaje de usuario para evitar duplicado
                msgs.pop();
                saveConversations();
                renderMessages();
                // Reconstruir pendingImages
                pendingImages = [...images];
                updateFilePreview();
                document.getElementById('messageInput').value = text;
                sendMessage();
            }
        }
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        sidebar.classList.toggle('collapsed');
        const toggle = sidebar.querySelector('.sidebar-toggle');
        toggle.textContent = sidebar.classList.contains('collapsed') ? '▶' : '◀';
    }

    // Eventos
    document.getElementById('attachBtn').onclick = attachFile;
    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('testApiBtn').onclick = testApi;
    document.getElementById('messageInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey && isApiReady) {
            e.preventDefault();
            sendMessage();
        }
    });
    // Auto-resize textarea
    document.getElementById('messageInput').addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 200) + 'px';
    });

    // Cargar API key
    if (apiKey) {
        document.getElementById('apiKeyInput').value = apiKey;
        testApi();
    }
    loadConversations();
</script>
</body>
</html>

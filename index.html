<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat con DeepSeek API</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            width: 90%;
            max-width: 1200px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.assistant .message-content {
            background: white;
            border: 1px solid #e0e0e0;
            color: #333;
        }

        .message-icon {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .message.user .message-icon {
            background: #667eea;
            color: white;
        }

        .message.assistant .message-icon {
            background: #f0f0f0;
            color: #667eea;
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 25px;
            outline: none;
            font-size: 16px;
        }

        .input-area input:focus {
            border-color: #667eea;
        }

        .input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
        }

        .input-area button:hover {
            transform: scale(1.05);
        }

        .input-area button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .config-panel {
            background: #f8f9fa;
            padding: 15px 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .config-panel input {
            flex: 1;
            padding: 8px;
            border: 1px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
        }

        .config-panel label {
            font-size: 14px;
            color: #666;
        }

        .typing-indicator {
            display: none;
            padding: 12px 16px;
            background: white;
            border-radius: 18px;
            border: 1px solid #e0e0e0;
            width: fit-content;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🤖 Chat con DeepSeek API</h1>
            <p>Conversaciones ilimitadas sin interrupciones</p>
        </div>
        
        <div class="messages" id="messages">
            <div class="message assistant">
                <div class="message-icon">🤖</div>
                <div class="message-content">
                    ¡Hola! Soy tu asistente DeepSeek. ¿En qué puedo ayudarte hoy?
                </div>
            </div>
        </div>

        <div class="config-panel">
            <label>🔑 API Key:</label>
            <input type="password" id="apiKey" placeholder="Ingresa tu API key de DeepSeek" style="flex: 2;">
            <label>🌡️ Temperatura:</label>
            <input type="number" id="temperature" value="0.7" step="0.1" min="0" max="2" style="width: 80px;">
            <button id="saveConfig" style="background: #28a745; padding: 8px 16px;">💾 Guardar</button>
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Escribe tu mensaje aquí..." onkeypress="handleKeyPress(event)">
            <button id="sendButton">Enviar ➤</button>
        </div>
    </div>

    <script>
        let conversationHistory = [];
        let apiKey = localStorage.getItem('deepseek_api_key') || '';
        let temperature = localStorage.getItem('deepseek_temperature') || 0.7;

        // Configurar valores guardados
        document.getElementById('apiKey').value = apiKey;
        document.getElementById('temperature').value = temperature;

        // Guardar configuración
        document.getElementById('saveConfig').onclick = () => {
            apiKey = document.getElementById('apiKey').value;
            temperature = parseFloat(document.getElementById('temperature').value);
            localStorage.setItem('deepseek_api_key', apiKey);
            localStorage.setItem('deepseek_temperature', temperature);
            alert('Configuración guardada correctamente');
        };

        // Función para agregar mensaje al chat
        function addMessage(role, content) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const icon = role === 'user' ? '👤' : '🤖';
            messageDiv.innerHTML = `
                <div class="message-icon">${icon}</div>
                <div class="message-content">${content.replace(/\n/g, '<br>')}</div>
            `;
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            // Guardar en historial
            conversationHistory.push({ role, content });
            
            // Limitar historial a las últimas 50 conversaciones para no exceder tokens
            if (conversationHistory.length > 50) {
                conversationHistory = conversationHistory.slice(-50);
            }
        }

        // Mostrar indicador de escritura
        function showTypingIndicator() {
            const messagesDiv = document.getElementById('messages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typing-indicator';
            typingDiv.innerHTML = `
                <div class="message-icon">🤖</div>
                <div class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        // Enviar mensaje a la API
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            if (!apiKey) {
                alert('Por favor, configura tu API key en el panel superior');
                return;
            }
            
            // Deshabilitar botón y input
            const sendButton = document.getElementById('sendButton');
            sendButton.disabled = true;
            input.disabled = true;
            
            // Agregar mensaje del usuario
            addMessage('user', message);
            input.value = '';
            
            // Mostrar indicador de escritura
            showTypingIndicator();
            
            try {
                // Preparar mensajes para la API
                const messages = [
                    { role: 'system', content: 'Eres un asistente útil y amigable.' },
                    ...conversationHistory
                ];
                
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: messages,
                        temperature: temperature,
                        max_tokens: 4096,
                        stream: false
                    })
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || 'Error en la API');
                }
                
                const data = await response.json();
                const assistantMessage = data.choices[0].message.content;
                
                removeTypingIndicator();
                addMessage('assistant', assistantMessage);
                
            } catch (error) {
                removeTypingIndicator();
                addMessage('assistant', `❌ Error: ${error.message}\n\nVerifica tu API key y conexión a internet.`);
                console.error('Error:', error);
            } finally {
                // Habilitar botón y input
                sendButton.disabled = false;
                input.disabled = false;
                input.focus();
            }
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }
        
        // Event listeners
        document.getElementById('sendButton').onclick = sendMessage;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek Clone - Asistente IA</title>
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Highlight.js para código -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0f0f0f;
            height: 100vh;
            overflow: hidden;
            color: #e1e1e1;
        }

        /* Layout principal */
        .app {
            display: flex;
            height: 100vh;
        }

        /* Sidebar - estilo DeepSeek */
        .sidebar {
            width: 260px;
            background: #0a0a0a;
            border-right: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            transition: width 0.2s;
            position: relative;
        }

        .sidebar.collapsed {
            width: 60px;
        }

        .sidebar-toggle {
            position: absolute;
            right: -12px;
            top: 20px;
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            color: #888;
            font-size: 12px;
            transition: all 0.2s;
        }

        .sidebar-toggle:hover {
            background: #2a2a2a;
            color: #fff;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid #2a2a2a;
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
            transition: all 0.2s;
        }

        .new-chat-btn:hover {
            background: #2a2a2a;
            border-color: #4a4a4a;
        }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .conv-item {
            padding: 12px;
            margin-bottom: 4px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar.collapsed .conv-item {
            text-align: center;
            padding: 12px 0;
        }

        .sidebar.collapsed .conv-title {
            display: none;
        }

        .sidebar.collapsed .conv-date {
            display: none;
        }

        .conv-item:hover {
            background: #1a1a1a;
        }

        .conv-item.active {
            background: #1e2a3a;
            border-left: 3px solid #4a9eff;
        }

        .conv-title {
            font-weight: 500;
            margin-bottom: 4px;
            font-size: 13px;
        }

        .conv-date {
            font-size: 11px;
            color: #6b6b6b;
        }

        .conv-actions {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            display: none;
            gap: 6px;
        }

        .conv-item:hover .conv-actions {
            display: flex;
        }

        .conv-actions button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            opacity: 0.6;
            padding: 4px;
            border-radius: 4px;
        }

        .conv-actions button:hover {
            opacity: 1;
            background: #2a2a2a;
        }

        /* Chat principal */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f0f0f;
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0a0a0a;
        }

        .chat-header h1 {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .model-selector {
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 13px;
            color: white;
            cursor: pointer;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e74c3c;
            display: inline-block;
        }

        .status-dot.connected {
            background: #27ae60;
        }

        .status-dot.testing {
            background: #f39c12;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Messages area */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
        }

        .message {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 24px;
            display: flex;
            gap: 16px;
            border-bottom: 1px solid #1a1a1a;
        }

        .message.user {
            background: transparent;
        }

        .message.assistant {
            background: #0a0a0a;
        }

        .message-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.user .message-icon {
            background: #2a2a2a;
        }

        .message-content {
            flex: 1;
            line-height: 1.6;
            font-size: 15px;
        }

        .message-content h1, .message-content h2, .message-content h3 {
            margin: 16px 0 8px 0;
        }

        .message-content p {
            margin: 8px 0;
        }

        .message-content code {
            background: #1a1a1a;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Monaco', monospace;
            font-size: 13px;
        }

        .message-content pre {
            background: #1a1a1a;
            padding: 16px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 12px 0;
        }

        .message-content pre code {
            background: none;
            padding: 0;
        }

        .message-content ul, .message-content ol {
            margin: 8px 0;
            padding-left: 24px;
        }

        .message-actions {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .message:hover .message-actions {
            opacity: 1;
        }

        .message-actions button {
            background: none;
            border: none;
            color: #6b6b6b;
            cursor: pointer;
            font-size: 13px;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .message-actions button:hover {
            background: #1a1a1a;
            color: white;
        }

        /* Input area */
        .input-container {
            padding: 20px 24px 32px;
            background: #0f0f0f;
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            background: #1a1a1a;
            border-radius: 24px;
            border: 1px solid #2a2a2a;
            transition: border-color 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #4a9eff;
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            padding: 16px 20px;
            color: white;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            outline: none;
            min-height: 60px;
            max-height: 200px;
        }

        .input-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px 12px;
            border-top: 1px solid #2a2a2a;
        }

        .send-btn {
            background: #4a9eff;
            border: none;
            border-radius: 20px;
            padding: 8px 20px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .send-btn:hover:not(:disabled) {
            background: #3a8eef;
            transform: scale(1.02);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .api-config {
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 12px;
            color: #6b6b6b;
        }

        .api-config input {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 6px 12px;
            color: white;
            font-size: 12px;
            width: 280px;
            outline: none;
        }

        .api-config button {
            background: #2a2a2a;
            border: none;
            border-radius: 16px;
            padding: 6px 12px;
            color: white;
            cursor: pointer;
            font-size: 11px;
        }

        .loading {
            display: inline-flex;
            gap: 4px;
            align-items: center;
        }

        .loading span {
            width: 6px;
            height: 6px;
            background: #6b6b6b;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading span:nth-child(1) { animation-delay: -0.32s; }
        .loading span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 13px;
            z-index: 1000;
            animation: slideIn 0.2s;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        ::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-toggle" onclick="toggleSidebar()">◀</div>
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="createNewChat()">+ Nueva conversación</button>
            </div>
            <div class="conversations-list" id="conversationsList"></div>
        </div>

        <div class="chat-main">
            <div class="chat-header">
                <h1>🤖 DeepSeek <span style="font-weight: normal; font-size: 14px;">by AlbertoHP</span></h1>
                <div style="display: flex; gap: 12px; align-items: center;">
                    <select id="modelSelect" class="model-selector">
                        <option value="deepseek-chat">DeepSeek-V3 (Rápido)</option>
                        <option value="deepseek-reasoner">DeepSeek-R1 (Razonamiento)</option>
                    </select>
                    <div class="api-config">
                        <input type="password" id="apiKeyInput" placeholder="API Key">
                        <button id="testApiBtn">Probar</button>
                        <div id="statusDot" class="status-dot"></div>
                    </div>
                </div>
            </div>

            <div class="messages" id="messages"></div>

            <div class="input-container">
                <div class="input-wrapper">
                    <textarea id="messageInput" rows="1" placeholder="Escribe un mensaje..."></textarea>
                    <div class="input-footer">
                        <span style="font-size: 11px; color: #6b6b6b;">↵ Enter para enviar</span>
                        <button class="send-btn" id="sendBtn">Enviar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuración
        let conversations = {};
        let currentId = null;
        let apiKey = localStorage.getItem('deepseek_api_key') || '';
        let isApiReady = false;

        // Inicializar marked
        marked.setOptions({
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            }
        });

        // Cargar conversaciones
        function loadConversations() {
            const saved = localStorage.getItem('deepseek_conversations');
            if (saved) {
                conversations = JSON.parse(saved);
                if (Object.keys(conversations).length === 0) createDefaultChat();
            } else {
                createDefaultChat();
            }
            
            const lastId = localStorage.getItem('deepseek_last_id');
            if (lastId && conversations[lastId]) currentId = lastId;
            else currentId = Object.keys(conversations)[0];
            
            renderSidebar();
            renderMessages();
        }

        function createDefaultChat() {
            const id = Date.now().toString();
            conversations[id] = {
                id: id,
                title: 'Nueva conversación',
                updated: Date.now(),
                messages: [{ role: 'assistant', content: '¡Hola! Soy DeepSeek. Configura tu API key arriba para comenzar.' }]
            };
            currentId = id;
            saveConversations();
        }

        function saveConversations() {
            localStorage.setItem('deepseek_conversations', JSON.stringify(conversations));
            if (currentId) localStorage.setItem('deepseek_last_id', currentId);
        }

        function renderSidebar() {
            const container = document.getElementById('conversationsList');
            const sorted = Object.values(conversations).sort((a, b) => b.updated - a.updated);
            
            container.innerHTML = sorted.map(conv => `
                <div class="conv-item ${conv.id === currentId ? 'active' : ''}" onclick="switchChat('${conv.id}')">
                    <div class="conv-title">${escapeHtml(conv.title)}</div>
                    <div class="conv-date">${new Date(conv.updated).toLocaleDateString()}</div>
                    <div class="conv-actions">
                        <button onclick="event.stopPropagation(); deleteChat('${conv.id}')" title="Eliminar">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        function renderMessages() {
            if (!currentId || !conversations[currentId]) return;
            
            const container = document.getElementById('messages');
            const conv = conversations[currentId];
            
            container.innerHTML = conv.messages.map((msg, idx) => `
                <div class="message ${msg.role}">
                    <div class="message-icon">${msg.role === 'user' ? '👤' : '🤖'}</div>
                    <div class="message-content">
                        ${msg.role === 'assistant' ? marked.parse(msg.content) : escapeHtml(msg.content).replace(/\n/g, '<br>')}
                        ${msg.role === 'assistant' ? `
                            <div class="message-actions">
                                <button onclick="copyText('${escapeHtml(msg.content).replace(/'/g, "\\'")}')">📋 Copiar</button>
                                <button onclick="regenerateLast()">🔄 Regenerar</button>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');
            
            container.scrollTop = container.scrollHeight;
            
            // Highlight código
            document.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
        }

        function addMessage(role, content) {
            if (!currentId) return;
            conversations[currentId].messages.push({ role, content });
            conversations[currentId].updated = Date.now();
            
            // Auto-titular conversación
            if (role === 'user' && conversations[currentId].messages.filter(m => m.role === 'user').length === 1) {
                let title = content.substring(0, 30);
                if (content.length > 30) title += '...';
                conversations[currentId].title = title;
            }
            
            saveConversations();
            renderSidebar();
            renderMessages();
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message || !isApiReady) return;
            
            input.value = '';
            input.style.height = 'auto';
            addMessage('user', message);
            
            // Mostrar loading
            const container = document.getElementById('messages');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.id = 'loading-msg';
            loadingDiv.innerHTML = `
                <div class="message-icon">🤖</div>
                <div class="message-content">
                    <div class="loading"><span></span><span></span><span></span> Pensando...</div>
                </div>
            `;
            container.appendChild(loadingDiv);
            container.scrollTop = container.scrollHeight;
            
            try {
                const model = document.getElementById('modelSelect').value;
                const history = conversations[currentId].messages.slice(-20); // Últimos 20 mensajes
                
                const response = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: history,
                        temperature: 0.7,
                        max_tokens: 4096
                    })
                });
                
                document.getElementById('loading-msg')?.remove();
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error?.message || 'Error en API');
                }
                
                const data = await response.json();
                const reply = data.choices[0].message.content;
                addMessage('assistant', reply);
                
            } catch (error) {
                document.getElementById('loading-msg')?.remove();
                addMessage('assistant', `❌ **Error:** ${error.message}\n\nVerifica tu API key y saldo en [platform.deepseek.com](https://platform.deepseek.com)`);
            }
        }

        async function testApi() {
            const key = document.getElementById('apiKeyInput').value.trim();
            if (!key) {
                showToast('Ingresa una API key');
                return;
            }
            
            const dot = document.getElementById('statusDot');
            dot.className = 'status-dot testing';
            
            try {
                const response = await fetch('https://api.deepseek.com/models', {
                    headers: { 'Authorization': `Bearer ${key}` }
                });
                
                if (response.ok) {
                    apiKey = key;
                    localStorage.setItem('deepseek_api_key', key);
                    isApiReady = true;
                    dot.className = 'status-dot connected';
                    showToast('✅ API conectada correctamente');
                    addSystemMessage('✅ API configurada. ¡Ya puedes chatear!');
                } else {
                    throw new Error('Key inválida');
                }
            } catch (error) {
                isApiReady = false;
                dot.className = 'status-dot';
                showToast('❌ Error: API key inválida o sin créditos');
            }
        }

        function addSystemMessage(content) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.innerHTML = `
                <div class="message-icon">ℹ️</div>
                <div class="message-content">${marked.parse(content)}</div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function createNewChat() {
            const id = Date.now().toString();
            conversations[id] = {
                id: id,
                title: `Conversación ${new Date().toLocaleString()}`,
                updated: Date.now(),
                messages: [{ role: 'assistant', content: '¡Hola! ¿En qué puedo ayudarte?' }]
            };
            currentId = id;
            saveConversations();
            renderSidebar();
            renderMessages();
            showToast('Nueva conversación creada');
        }

        function switchChat(id) {
            if (conversations[id]) {
                currentId = id;
                saveConversations();
                renderSidebar();
                renderMessages();
            }
        }

        function deleteChat(id) {
            if (confirm('¿Eliminar esta conversación?')) {
                delete conversations[id];
                if (currentId === id) {
                    const remaining = Object.keys(conversations);
                    currentId = remaining.length ? remaining[0] : null;
                    if (!currentId) createDefaultChat();
                }
                saveConversations();
                renderSidebar();
                renderMessages();
                showToast('Conversación eliminada');
            }
        }

        function copyText(text) {
            navigator.clipboard.writeText(text);
            showToast('📋 Copiado al portapapeles');
        }

        function regenerateLast() {
            if (!conversations[currentId]) return;
            const messages = conversations[currentId].messages;
            if (messages.length < 2) return;
            
            // Eliminar último mensaje del asistente
            if (messages[messages.length - 1].role === 'assistant') {
                messages.pop();
                saveConversations();
                renderMessages();
                
                // Reenviar el último mensaje del usuario
                const lastUserMsg = messages[messages.length - 1];
                if (lastUserMsg && lastUserMsg.role === 'user') {
                    // Simular envío
                    const msg = lastUserMsg.content;
                    messages.pop(); // Quitar también el mensaje de usuario para reenviarlo limpio
                    saveConversations();
                    renderMessages();
                    document.getElementById('messageInput').value = msg;
                    sendMessage();
                }
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
            const toggle = sidebar.querySelector('.sidebar-toggle');
            toggle.textContent = sidebar.classList.contains('collapsed') ? '▶' : '◀';
        }

        // Auto-resize textarea
        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        document.getElementById('messageInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && isApiReady) {
                e.preventDefault();
                sendMessage();
            }
        });

        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('testApiBtn').onclick = testApi;
        
        // Cargar API key guardada
        if (apiKey) {
            document.getElementById('apiKeyInput').value = apiKey;
            testApi();
        }
        
        document.getElementById('apiKeyInput').value = apiKey;
        loadConversations();
    </script>
</body>
</html>
